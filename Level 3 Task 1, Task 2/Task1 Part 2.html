<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Automatic Slideshow</title>
  <link rel="stylesheet" href="styles2.css">
</head>
<body>

<h2>Automatic Image Slideshow </h2>

<div class="slideshow-container">

  <div class="slide">
    <img src="https://media.istockphoto.com/id/517188688/photo/mountain-landscape.jpg?s=612x612&w=0&k=20&c=A63koPKaCyIwQWOTFBRWXj_PwCrR4cEoOw2S9Q7yVl8=" alt="Slide 1">
  </div>

  <div class="slide">
    <img src="https://static.vecteezy.com/system/resources/thumbnails/025/067/762/small/4k-beautiful-colorful-abstract-wallpaper-photo.jpg" alt="Slide 2">
  </div>

  <div class="slide">
    <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1200&q=80" alt="Slide 3">
  </div>

  <div class="slide">
    <img src="https://static.vecteezy.com/system/resources/thumbnails/025/067/762/small/4k-beautiful-colorful-abstract-wallpaper-photo.jpg" alt="Slide 4">
  </div>

</div>

</body>
</html>
